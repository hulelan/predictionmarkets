data:
  polymarket:
    base_url: "https://gamma-api.polymarket.com/markets"
    end_date_min: "2026-03-08"
    end_date_max: "2026-03-15"
    max_markets: 800
    rate_limit_delay: 0.5
  manifold:
    search_url: "https://api.manifold.markets/v0/search-markets"
    market_url: "https://api.manifold.markets/v0/market"
    close_date_min: "2026-03-08"
    close_date_max: "2026-03-15"
    max_markets: 300
    rate_limit_delay: 0.3

filters:
  min_probability: 0.02
  max_probability: 0.98
  min_volume: 0
  target_total: 1000

models:
  openai:
    model: "gpt-5.2"
    reasoning_effort: "medium"
    temperature: 0.3
    max_tokens: 500
    concurrency: 10
  anthropic:
    model: "claude-opus-4-6"
    temperature: 0.3
    max_tokens: 500
    concurrency: 5
  gemini:
    model: "gemini-2.5-pro"
    temperature: 0.3
    max_tokens: 500
    concurrency: 10

agent:
  extremize_factor: 1.3
  high_volume_market_weight: 0.4
  low_volume_market_weight: 0.3
  disagreement_threshold: 0.2
  consensus_spread_threshold: 0.1
  web_search_enabled: true

scoring:
  calibration_bins: 10
